<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ student.name }} History</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#0f1320; color:#e8eaf0; margin:0; padding:18px; }
    .card { border:1px solid #2d3345; background:#151a27; border-radius:12px; overflow:hidden; }
    .head { padding:14px 16px; border-bottom:1px solid #2d3345; background:#1d2436; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .title { font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#9ba5c7; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:10px 12px; font-size:11px; color:#818bad; letter-spacing:.08em; text-transform:uppercase; border-bottom:1px solid #2d3345; background:#1b2232; }
    td { padding:10px 12px; border-bottom:1px solid #2d3345; color:#ced4e7; vertical-align:top; }
    tr:last-child td { border-bottom:none; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; color:#9ba5c7; white-space:nowrap; }
    .pill { padding:2px 8px; border-radius:999px; font-size:11px; background:#283149; color:#ced4e7; display:inline-block; }
    .muted { color:#95a0c4; }
    .empty { text-align:center; padding:26px; color:#8c96b8; }
    button { background:#2f65f6; border:none; color:#fff; font-size:12px; border-radius:8px; padding:7px 12px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div>
        <div class="title">📘 Student History</div>
        <div style="font-size:16px;font-weight:600;margin-top:4px">{{ student.name }}</div>
      </div>
      <button onclick="window.close()">Close</button>
    </div>
    <table>
      <thead><tr><th>When</th><th>Type</th><th>Source</th><th>Details</th></tr></thead>
      <tbody>
        {% for ev in events %}
        <tr>
          <td class="mono">{{ ev.created_at }}</td>
          <td><span class="pill">{{ ev.event_type }}</span></td>
          <td class="muted">{{ ev.source or '—' }}</td>
          <td>{{ ev.details or '—' }}</td>
        </tr>
        {% endfor %}
        {% if not events %}<tr><td colspan="4" class="empty">No history yet</td></tr>{% endif %}
      </tbody>
    </table>
  </div>
</body>
</html>
