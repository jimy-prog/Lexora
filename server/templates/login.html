<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — Lexora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background-color:#f6f7fb;
  background-image:radial-gradient(circle, rgba(123, 97, 255, 0.07) 1px, transparent 1px);
  background-size:24px 24px;
  -webkit-font-smoothing:antialiased;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:20px;
  padding:44px 40px;
  width:100%;
  max-width:400px;
  box-shadow:0 18px 50px rgba(17, 24, 39, 0.1);
}
.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:2rem;
  font-weight:600;
  color:#101114;
  text-align:center;
  margin-bottom:6px;
  letter-spacing:-0.03em;
}
.logo span{color:#7b61ff}
.sub{
  text-align:center;
  font-size:.72rem;
  color:#6b6f7a;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:28px;
  font-weight:500;
}
.form-label{
  display:block;
  font-size:.68rem;
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#6b6f7a;
  margin-bottom:8px;
}
.form-control{
  width:100%;
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:13px 16px;
  font-family:'Inter',sans-serif;
  font-size:1rem;
  color:#101114;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
  -webkit-appearance:none;
}
.form-control:focus{
  border-color:#7b61ff;
  box-shadow:0 0 0 3px rgba(123, 97, 255, 0.2);
}
.form-group{margin-bottom:20px}
.btn{
  width:100%;
  background:#7b61ff;
  color:#fff;
  border:none;
  border-radius:999px;
  padding:14px;
  font-family:'Inter',sans-serif;
  font-size:.95rem;
  font-weight:600;
  cursor:pointer;
  transition:background .15s, transform .1s;
  margin-top:8px;
}
.btn:hover{background:#6b51ef}
.btn:active{transform:scale(.99)}
.error{
  background:rgba(220, 38, 38, 0.08);
  border:1px solid rgba(220, 38, 38, 0.25);
  color:#b91c1c;
  padding:12px 14px;
  border-radius:12px;
  font-size:.82rem;
  margin-bottom:18px;
  text-align:center;
}
.hint{
  text-align:center;
  font-size:.75rem;
  color:#6b6f7a;
  margin-top:20px;
  line-height:1.5;
}
.back{
  display:block;
  text-align:center;
  margin-top:18px;
  font-size:.8rem;
  color:#7b61ff;
  text-decoration:none;
  font-weight:500;
}
.back:hover{text-decoration:underline}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:rgba(123,97,255,.35);border-radius:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lex<span>ora</span></div>
  <div class="sub">English Learning Platform</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-group">
      <label class="form-label">Username or Email</label>
      <input class="form-control" type="text" name="identifier" autofocus autocomplete="username" placeholder="owner or owner@lexora.local">
    </div>
    <div class="form-group" style="margin-bottom: 12px;">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" name="password" autocomplete="current-password" placeholder="Enter your password">
    </div>
    <div style="text-align: right; margin-bottom: 24px;">
      <a href="/forgot-password" style="font-size: .75rem; color: #7b61ff; text-decoration: none; font-weight: 500;">Forgot Password?</a>
    </div>
    <button class="btn" type="submit">Sign In</button>
  </form>

  <div style="display: flex; align-items: center; text-align: center; color: #94a3b8; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin: 20px 0;">
    <div style="flex: 1; border-bottom: 1px solid #e5e7eb; margin-right: 12px;"></div>
    Or
    <div style="flex: 1; border-bottom: 1px solid #e5e7eb; margin-left: 12px;"></div>
  </div>

  <button class="btn" style="background:#fff; color:#101114; border:1px solid #e5e7eb; display:flex; align-items:center; justify-content:center; gap:8px;" type="button" onclick="signInWithGoogle()">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width:18px;height:18px;">
    Continue with Google
  </button>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCMKfr_8yaqH3enXOquIJyTZligD1Z9r3Q",
      authDomain: "lexora-8fb1d.firebaseapp.com",
      projectId: "lexora-8fb1d",
      storageBucket: "lexora-8fb1d.firebasestorage.app",
      messagingSenderId: "542718167664",
      appId: "1:542718167664:web:658c9735d475c4046d3e8e",
      measurementId: "G-GZ96C4T1X6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // Handle result after redirect back to this page
    auth.getRedirectResult().then((result) => {
      if (result && result.user) {
        result.user.getIdToken().then(idToken => {
          submitFirebaseToken(idToken);
        });
      }
    }).catch((error) => {
      if (error.code !== 'auth/no-current-user') {
        console.error('Google redirect error:', error);
        const errDiv = document.querySelector('.error') || document.createElement('div');
        errDiv.className = 'error';
        errDiv.style.display = 'block';
        errDiv.textContent = 'Google sign-in failed: ' + error.message;
        document.querySelector('.card').insertBefore(errDiv, document.querySelector('form'));
      }
    });

    function signInWithGoogle() {
      auth.signInWithRedirect(provider);
    }

    function submitFirebaseToken(idToken) {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = '/api/auth/firebase-login';
      const tokenInput = document.createElement('input');
      tokenInput.type = 'hidden';
      tokenInput.name = 'id_token';
      tokenInput.value = idToken;
      form.appendChild(tokenInput);
      document.body.appendChild(form);
      form.submit();
    }
  </script>

  <div class="hint">Need an account? <a href="/register" style="color:#7b61ff; text-decoration:none; font-weight:600;">Register here</a></div>
  <a class="back" href="/static/landing/index.html">← Back to website</a>
</div>
</body>
</html>
