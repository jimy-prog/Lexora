<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Create Account — Lexora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background-color:#f6f7fb;
  background-image:radial-gradient(circle, rgba(123, 97, 255, 0.07) 1px, transparent 1px);
  background-size:24px 24px;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:24px;
  padding:44px 40px;
  width:100%;
  max-width:500px;
  box-shadow:0 25px 50px -12px rgba(17, 24, 39, 0.1);
}
.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:2rem;
  font-weight:700;
  color:#101114;
  text-align:center;
  margin-bottom:6px;
  letter-spacing:-0.03em;
}
.logo span{color:#7b61ff}
.sub{
  text-align:center;
  font-size:.75rem;
  color:#64748b;
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:32px;
  font-weight:600;
}
.form-label{
  display:block;
  font-size:.7rem;
  font-weight:600;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:#64748b;
  margin-bottom:8px;
}
.form-control, select{
  width:100%;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:12px;
  padding:14px 16px;
  font-family:'Inter',sans-serif;
  font-size:1rem;
  color:#0f172a;
  outline:none;
  transition:all .2s;
}
.form-control:focus, select:focus{
  border-color:#7b61ff;
  background:#fff;
  box-shadow:0 0 0 4px rgba(123, 97, 255, 0.15);
}
.form-group{margin-bottom:24px}
.btn{
  width:100%;
  background:#7b61ff;
  color:#fff;
  border:none;
  border-radius:12px;
  padding:16px;
  font-family:'Inter',sans-serif;
  font-size:1.05rem;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn:hover{background:#6b51ef; transform:translateY(-1px);}
.btn:active{transform:scale(.99)}
.btn-google {
  background:#fff;
  color:#334155;
  border:1px solid #e2e8f0;
  margin-top:16px;
}
.btn-google:hover {
  background:#f8fafc;
}
.error{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#ef4444;
  padding:14px;
  border-radius:12px;
  font-size:.85rem;
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:8px;
}
.step { display: none; }
.step.active { display: block; }
.divider {
  display: flex;
  align-items: center;
  text-align: center;
  color: #94a3b8;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  margin: 24px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  border-bottom: 1px solid #e2e8f0;
}
.divider:not(:empty)::before { margin-right: 16px; }
.divider:not(:empty)::after { margin-left: 16px; }
.login-link {
  text-align:center;
  margin-top:24px;
  font-size:.85rem;
  color:#64748b;
}
.login-link a {
  color:#7b61ff;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lex<span>ora</span></div>
  <div class="sub">Create Your Account</div>
  
  {% if error %}
  <div class="error"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
  {% endif %}

  <!-- Single Step: Registration Form -->
  <div id="step-registration" class="step active">
    <form method="post" action="/register/direct">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-control" type="text" name="full_name" required placeholder="John Doe">
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" name="email" required placeholder="you@example.com">
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required placeholder="Create a strong password">
      </div>

      <div class="form-group">
        <label class="form-label">I am a...</label>
        <select name="account_type" required>
          <option value="student">Student learning English</option>
          <option value="teacher">Teacher/Tutor</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Primary Study Focus</label>
        <select name="study_focus" required>
          <option value="ielts_academic">IELTS Academic</option>
          <option value="ielts_general">IELTS General Training</option>
          <option value="general_english">General English</option>
          <option value="other">Other</option>
        </select>
      </div>

      <button class="btn" type="submit">Create Account</button>
    </form>
    
    <div class="divider">Or</div>
    
    <button class="btn btn-google" type="button" onclick="signInWithGoogle()">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width:20px;height:20px;">
      Sign up with Google
    </button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCMKfr_8vaqH3enXOquIJvTZLigD1Z9r30",
      authDomain: "lexora-8fb1d.firebaseapp.com",
      projectId: "lexora-8fb1d",
      storageBucket: "lexora-8fb1d.firebasestorage.app",
      messagingSenderId: "542718167664",
      appId: "1:542718167664:web:658c9735d475c4046d3e8e",
      measurementId: "G-GZ96C4T1X6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).then((result) => {
        const user = result.user;
        user.getIdToken().then(idToken => {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/api/auth/firebase-login';
            
            const tokenInput = document.createElement('input');
            tokenInput.type = 'hidden';
            tokenInput.name = 'id_token';
            tokenInput.value = idToken;
            form.appendChild(tokenInput);
            
            document.body.appendChild(form);
            form.submit();
        });
      }).catch((error) => {
        alert(error.message);
      });
    }
  </script>
  
  <div class="login-link">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>
</body>
</html>
