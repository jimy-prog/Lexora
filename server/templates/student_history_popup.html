<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ student.name }} History</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f6f7fb;
      background-image: radial-gradient(circle, rgba(123, 97, 255, 0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      color: #101114;
      margin: 0;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(17, 24, 39, 0.1);
      max-width: 900px;
      margin: 0 auto;
    }
    .head {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      background: #f0f1f6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b6f7a;
      font-family: 'Inter', sans-serif;
    }
    .student-line {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 4px;
      color: #101114;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.65rem;
      color: #6b6f7a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
      font-weight: 600;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f1f6;
      color: #374151;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #6b6f7a;
      white-space: nowrap;
    }
    .pill {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(123, 97, 255, 0.12);
      color: #5b4ccc;
      display: inline-block;
    }
    .muted { color: #6b6f7a; }
    .empty { text-align: center; padding: 36px; color: #9ca3af; }
    button {
      background: #7b61ff;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-radius: 999px;
      padding: 9px 18px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }
    button:hover { background: #6b51ef; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div>
        <div class="title">📘 Student History</div>
        <div class="student-line">{{ student.name }}</div>
      </div>
      <button type="button" onclick="window.close()">Close</button>
    </div>
    <table>
      <thead><tr><th>When</th><th>Type</th><th>Source</th><th>Details</th></tr></thead>
      <tbody>
        {% for ev in events %}
        <tr>
          <td class="mono">{{ ev.created_at }}</td>
          <td><span class="pill">{{ ev.event_type }}</span></td>
          <td class="muted">{{ ev.source or '—' }}</td>
          <td>{{ ev.details or '—' }}</td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="empty">No history entries yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
