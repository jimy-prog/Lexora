# Lexora — production-style stack (PostgreSQL + FastAPI).
# Run from repository root:
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# Optional Cloudflare Tunnel in front of the app container:
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env --profile tunnel up -d --build

name: lexora

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-lexora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: ..
      dockerfile: cloudflare_deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Lexora}
      APP_TAGLINE: ${APP_TAGLINE:-English Learning Platform}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?Set SESSION_SECRET_KEY in deploy/.env}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD in deploy/.env}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-lexora_session}
      OWNER_USERNAME: ${OWNER_USERNAME:-owner}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@lexora.local}
      OWNER_FULL_NAME: ${OWNER_FULL_NAME:-Lexora Owner}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-lexora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lexora}
    volumes:
      - lexora_uploads:/app/uploads
      - lexora_backups:/app/backups
    ports:
      - "${EXPOSE_PORT:-8000}:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Токен нужен только если запускаешь: docker compose ... --profile tunnel
  # Переменная в command с :? ломала обычный запуск — compose читает весь файл сразу.
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel --no-autoupdate run

volumes:
  postgres_data:
  lexora_uploads:
  lexora_backups:
